name: Playwright Automation Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        id: tests
        continue-on-error: true
        run: |
          npx playwright test 
      - name: Debug JSON Report
        if: always()
        run: |
          ls -R test-results

          echo "========================"

          cat test-results/results.json
      - name: Generate Test Summary
        if: always()
        run: |
          RESULT_FILE=$(find . -name "*.json" | grep -E "playwright|test-results|results" | head -1)

          if [ -z "$RESULT_FILE" ]; then
            echo "Could not find Playwright JSON report."
            echo "PASSED=0" >> $GITHUB_ENV
            echo "FAILED=0" >> $GITHUB_ENV
            echo "SKIPPED=0" >> $GITHUB_ENV
            echo "TOTAL=0" >> $GITHUB_ENV
            exit 0
          fi

          PASSED=$(jq '[.. | objects | select(.status?=="passed")] | length' "$RESULT_FILE")
          FAILED=$(jq '[.. | objects | select(.status?=="failed")] | length' "$RESULT_FILE")
          SKIPPED=$(jq '[.. | objects | select(.status?=="skipped")] | length' "$RESULT_FILE")
          TOTAL=$((PASSED + FAILED + SKIPPED))

          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Playwright-Report
          path: playwright-report/

      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: Playwright Automation Test Report

          to: |
            surabhi61115@gmail.com
            vishal.usei@gmail.com

          from: GitHub Actions

          html_body: |
            <h2>Playwright Automation Test Report</h2>

            <table border="1" cellpadding="8" cellspacing="0" style="border-collapse: collapse;">
              <tr style="background-color:#f2f2f2;">
                <th>Total</th>
                <th>Passed</th>
                <th>Failed</th>
                <th>Skipped</th>
              </tr>
              <tr align="center">
                <td>${{ env.TOTAL }}</td>
                <td>${{ env.PASSED }}</td>
                <td>${{ env.FAILED }}</td>
                <td>${{ env.SKIPPED }}</td>
              </tr>
            </table>

            <br>

            <b>Repository:</b> ${{ github.repository }}<br>
            <b>Branch:</b> ${{ github.ref_name }}<br>
            <b>Workflow:</b> ${{ github.workflow }}<br>
            <b>Run Number:</b> ${{ github.run_number }}<br>
            <b>Triggered By:</b> ${{ github.actor }}<br>

            <br>

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
              View GitHub Action Run
            </a>

      - name: Fail Workflow if Tests Failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
