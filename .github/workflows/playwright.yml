name: Playwright Automation Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        id: tests
        run: |
          npx playwright test
        continue-on-error: true

      - name: Generate Test Summary
        if: always()
        run: |
          PASSED=$(grep -oP '(?<=passed )[0-9]+' playwright-report/index.html | head -1 || echo 0)
          FAILED=$(grep -oP '(?<=failed )[0-9]+' playwright-report/index.html | head -1 || echo 0)
          SKIPPED=$(grep -oP '(?<=skipped )[0-9]+' playwright-report/index.html | head -1 || echo 0)

          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Playwright-Report
          path: playwright-report/

      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Playwright Test Execution Report

          to: your_email@gmail.com
          from: GitHub Actions

          html_body: |
            <h2>Playwright Test Execution Report</h2>

            <table border="1" cellpadding="8" cellspacing="0">
              <tr>
                <th>Total Passed</th>
                <th>Total Failed</th>
                <th>Total Skipped</th>
              </tr>
              <tr>
                <td>${{ env.PASSED }}</td>
                <td>${{ env.FAILED }}</td>
                <td>${{ env.SKIPPED }}</td>
              </tr>
            </table>

            <br>

            Repository: ${{ github.repository }}<br>
            Branch: ${{ github.ref_name }}<br>
            Workflow: ${{ github.workflow }}<br>
            Run Number: ${{ github.run_number }}<br>

            <br>

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
              View GitHub Action Run
            </a>

      - name: Fail Workflow if Tests Failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
